name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fingerprint-changes:
    name: Fingerprint input changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check fingerprint inputs
        id: diff
        run: |
          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.sha }}"

          if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            base_sha="$(git rev-list --max-parents=0 HEAD)"
          fi

          fingerprint_inputs=(
            "fingerprint.json"
            "hot-updater.config.ts"
            "package.json"
            "yarn.lock"
            ".yarn/patches/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/AppDelegate.h"
            "macos/com.jingjing2222.macdisplaybar-macOS/AppDelegate.mm"
            "macos/com.jingjing2222.macdisplaybar-macOS/Base.lproj/Main.storyboard"
            "macos/com.jingjing2222.macdisplaybar-macOS/DisplayCore/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/DisplayCore/**/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/Info.plist"
            "macos/com.jingjing2222.macdisplaybar-macOS/NativeDisplayControl/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/NativeDisplayControl/**/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/NativeFoo/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/NativeFoo/**/*"
            "macos/com.jingjing2222.macdisplaybar-macOS/com.jingjing2222.macdisplaybar.entitlements"
            "macos/com.jingjing2222.macdisplaybar-macOS/main.m"
            "macos/fingerprint-version.txt"
            "macos/com.jingjing2222.macdisplaybar.xcodeproj/project.pbxproj"
            "macos/Podfile"
            "macos/Podfile.lock"
            "macos/PrivacyInfo.xcprivacy"
            "specs/*.ts"
            "specs/**/*.ts"
          )

          changed=false
          while IFS= read -r path; do
            for fingerprint_input in "${fingerprint_inputs[@]}"; do
              if [[ "$path" == $fingerprint_input ]]; then
                changed=true
                break 2
              fi
            done
          done < <(git diff --name-only "$base_sha" "$head_sha")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

  js-checks:
    name: ${{ matrix.name }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Format
            task: format
          - name: Lint
            task: lint
          - name: Typecheck
            task: typecheck
          - name: Test
            task: test
          - name: Font check
            task: fonts
          - name: Fingerprint is fresh
            task: fingerprint
    env:
      HOT_UPDATER_BASE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: yarn install --immutable

      - name: Write CI hot-updater env
        run: |
          {
            echo "HOT_UPDATER_BASE_URL=https://example.invalid"
            echo "HOT_UPDATER_CLOUDFLARE_R2_BUCKET_NAME=ci"
            echo "HOT_UPDATER_CLOUDFLARE_ACCOUNT_ID=ci"
            echo "HOT_UPDATER_CLOUDFLARE_R2_ACCESS_KEY_ID=ci"
            echo "HOT_UPDATER_CLOUDFLARE_R2_SECRET_ACCESS_KEY=ci"
            echo "HOT_UPDATER_CLOUDFLARE_D1_DATABASE_ID=ci"
            echo "HOT_UPDATER_CLOUDFLARE_API_TOKEN=ci"
          } > .env.hotupdater

      - name: ${{ matrix.name }}
        run: |
          case "${{ matrix.task }}" in
            format)
              yarn format:check
              ;;
            lint)
              yarn lint
              ;;
            typecheck)
              yarn typecheck
              ;;
            test)
              yarn test
              ;;
            fonts)
              yarn check:fonts
              ;;
            fingerprint)
              yarn fingerprint:create
              if ! git diff --exit-code -- fingerprint.json macos/com.jingjing2222.macdisplaybar-macOS/Info.plist macos/fingerprint-version.txt; then
                echo "::error::Native fingerprint outputs are stale. Run yarn fingerprint:create and commit fingerprint.json, Info.plist, and macos/fingerprint-version.txt."
                exit 1
              fi
              ;;
          esac

  build:
    name: Build macOS app
    runs-on: macos-15
    needs: fingerprint-changes
    if: needs.fingerprint-changes.outputs.changed == 'true'
    env:
      HOT_UPDATER_BASE_URL: https://example.invalid
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install JavaScript dependencies
        run: yarn install --immutable

      - name: Write CI hot-updater env
        run: |
          {
            echo "HOT_UPDATER_BASE_URL=https://example.invalid"
            echo "HOT_UPDATER_CLOUDFLARE_R2_BUCKET_NAME=ci"
            echo "HOT_UPDATER_CLOUDFLARE_ACCOUNT_ID=ci"
            echo "HOT_UPDATER_CLOUDFLARE_R2_ACCESS_KEY_ID=ci"
            echo "HOT_UPDATER_CLOUDFLARE_R2_SECRET_ACCESS_KEY=ci"
            echo "HOT_UPDATER_CLOUDFLARE_D1_DATABASE_ID=ci"
            echo "HOT_UPDATER_CLOUDFLARE_API_TOKEN=ci"
          } > .env.hotupdater

      - name: Install CocoaPods dependencies
        run: pod install --project-directory=macos

      - name: Build macOS app
        run: |
          xcodebuild \
            -workspace macos/com.jingjing2222.macdisplaybar.xcworkspace \
            -scheme com.jingjing2222.macdisplaybar-macOS \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            build
